services:
  # 5. Managed Redis (for BullMQ / Celery)
  - name: agent_redis
    type: redis
    region: ohio
    plan: free
    ipAllowList: [] # Keep internal for security

  # 1. Node.js Auditor Backend
  - type: web
    name: backend-auditor
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./backend-auditor/Dockerfile
    envVars:
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: agent_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agent_redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

  # 2. Python Trader Backend (The A2MCP Endpoint)
  - type: web
    name: backend-trader
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./backend-trader/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agent_redis
          property: connectionString
      - key: OKX_API_KEY
        sync: false
      - key: OKX_SECRET_KEY
        sync: false
      - key: OKX_PASSPHRASE
        sync: false

  # 3. React Frontend
  - type: web
    name: frontend
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_AUDITOR_URL
        fromService:
          type: web
          name: backend-auditor
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_TRADER_URL
        fromService:
          type: web
          name: backend-trader
          envVarKey: RENDER_EXTERNAL_URL

databases:
  # 4. Managed PostgreSQL
  - name: agent_db
    databaseName: agent_db
    user: admin
    region: ohio
    plan: starter
