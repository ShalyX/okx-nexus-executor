version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: agent_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend-auditor
      - backend-trader
    environment:
      - VITE_AUDITOR_URL=http://localhost:3001
      - VITE_TRADER_URL=http://localhost:8000

  backend-auditor:
    build: ./backend-auditor
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://admin:password123@postgres:5432/agent_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - redis
      - postgres

  backend-trader:
    build: ./backend-trader
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://admin:password123@postgres:5432/agent_db
      - OKX_API_KEY=${OKX_API_KEY}
      - OKX_SECRET_KEY=${OKX_SECRET_KEY}
      - OKX_PASSPHRASE=${OKX_PASSPHRASE}
    depends_on:
      - redis
      - postgres

volumes:
  pgdata:
  redisdata:
